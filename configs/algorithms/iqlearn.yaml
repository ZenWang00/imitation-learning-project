name: iqlearn
gamma: 0.99
temperature: 0.1
regularization_weight: 1.0
learning_rate: 0.0003
max_grad_norm: 10.0
batch_size: 256
total_updates: 20000
target_update_interval: 250
replay_buffer_size: 50000
warmup_steps: 1000
rollout_steps_per_iter: 1
eval_interval: 500
early_stopping_patience_evals: 8
hidden_dims:
  - 128
  - 128
